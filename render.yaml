services:
  - type: web
    name: pharmacie-moustapha
    env: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: DATABASE_URL
        scope: run
        value: ""
      - key: SECRET_KEY
        scope: run
        value: ""
      - key: ALGORITHM
        scope: run
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        scope: run
        value: "60"
      - key: PYTHONUNBUFFERED
        scope: run
        value: "true"
