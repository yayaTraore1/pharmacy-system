<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mot de passe oublié</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fa;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

.card-box{
max-width:420px;
width:100%;
padding:2.5rem;
border-radius:1rem;
background:white;
box-shadow:0 8px 24px rgba(0,0,0,0.1);
}

h3{
font-weight:700;
color:#2c7a7b;
}

.btn-main{
background:#2c7a7b;
border:none;
font-weight:600;
}

.btn-main:hover{
background:#285e61;
}

.form-control:focus{
border-color:#2c7a7b;
box-shadow:0 0 0 .2rem rgba(44,122,123,.25);
}

</style>

</head>

<body>

<div class="card-box">

<div class="text-center mb-4">
<h3>Mot de passe oublié</h3>
<p class="text-muted small">Recevez un lien pour réinitialiser votre mot de passe</p>
</div>

{% if success %}
<div class="alert alert-success">{{success}}</div>
{% endif %}

{% if error %}
<div class="alert alert-danger">{{error}}</div>
{% endif %}

<form method="post" action="/auth/forgot-password">

<div class="mb-3">
<label>Email</label>
<input type="email" name="email" class="form-control" required>
</div>

<button class="btn btn-main w-100">
Envoyer le lien
</button>

</form>

<div class="text-center mt-3">
<a href="/login">Retour à la connexion</a>
</div>

</div>

</body>
</html>
