<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Pharmacie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .signup-card {
            border-radius: 1rem;
            max-width: 420px;
            width: 100%;
            background-color: #ffffff;
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .signup-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.15);
        }

        .signup-card h3 {
            font-weight: 700;
            color: #2c7a7b;
            margin-bottom: 1rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2c7a7b;
            box-shadow: 0 0 0 0.2rem rgba(44, 122, 123, 0.25);
        }

        .btn-primary {
            background-color: #2c7a7b;
            border-color: #2c7a7b;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #285e61;
            border-color: #285e61;
        }

        .signup-footer a {
            color: #2c7a7b;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-footer a:hover {
            text-decoration: underline;
            color: #285e61;
        }

        .logo {
            width: 80px;
            margin-bottom: 0.5rem;
        }

        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card signup-card">
        <div class="text-center mb-4">
            <img src="/static/images/logo.png" alt="Logo Pharmacie" class="logo">
            <h3>Créer un compte</h3>
            <p class="text-muted small">Entrez vos informations pour démarrer</p>
        </div>

        <form method="post" action="/auth/signup">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>

            <div class="mb-3">
                <select name="role" class="form-select" required>
                    <option value="" disabled selected>Choisir un rôle</option>
                    <option value="caissier">Caissier</option>
                    <option value="pharmacien">Pharmacien</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button class="btn btn-primary w-100 mt-3">S'inscrire</button>
        </form>

        <div class="text-center mt-4 signup-footer">
            <small>Déjà inscrit ? <a href="/login">Se connecter</a></small>
        </div>
    </div>
</body>
</html>
