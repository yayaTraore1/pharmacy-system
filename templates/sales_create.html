{% extends "base.html" %}
{% block title %}Nouvelle Vente{% endblock %}

{% block content %}

<div class="container-fluid">

    <h2 class="page-title"><i class="bi bi-cart-plus me-2"></i>Nouvelle Vente</h2>

    {% include "_sales_nav.html" %}

    <div class="card app-card">
        <div class="card-body p-4">

            <form id="saleForm">

                <div id="itemsContainer"></div>

                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-3 mb-3">
                    <button type="button"
                            class="btn btn-outline-primary"
                            onclick="addItem()">
                        <i class="bi bi-plus-circle me-1"></i>Ajouter Produit
                    </button>

                    <div class="p-3 rounded" style="background: rgba(44, 122, 123, 0.08);">
                        <h5 class="mb-0">
                            <i class="bi bi-cash-coin me-1"></i>Total :
                            <span id="totalDisplay" class="fw-bold" style="color: #2c7a7b;">0</span> GNF
                        </h5>
                    </div>
                </div>

                <hr>

                <div class="text-end">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-save me-1"></i>Enregistrer Vente
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>

let index = 0;

/* ================= AJOUT PRODUIT ================= */

function addItem() {

    const container = document.getElementById("itemsContainer");

    container.insertAdjacentHTML("beforeend", `
        <div class="row mb-3 align-items-end item-row border rounded p-3" id="row_${index}" style="background: #fafcfc;">

            <div class="col-md-6">
                <label class="form-label">Produit</label>
                <select class="form-select product-select"
                        name="product_${index}"
                        required
                        onchange="checkDuplicate(this); updateTotal();">
                    <option value="">----------- Choisir Produit ------------</option>
                    {% for product in products %}
                        <option value="{{ product.id }}"
                                data-price="{{ product.sale_price }}"
                                data-stock="{{ product.quantity }}">
                            {{ product.name }} — {{ product.sale_price|price }} GNF (Stock: {{ product.quantity }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Quantité</label>
                <input type="number"
                       class="form-control quantity-input"
                       name="quantity_${index}"
                       min="1"
                       required
                       oninput="validateStock(this); updateTotal();">
            </div>

            <div class="col-md-2">
                <button type="button"
                        class="btn btn-outline-danger w-100"
                        onclick="removeItem(${index})">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

        </div>
    `);

    index++;
}

/* ================= SUPPRESSION ================= */

function removeItem(i){
    const row = document.getElementById(`row_${i}`);
    if(row){
        row.remove();
        updateTotal();
    }
}

/* ================= TOTAL ================= */

function updateTotal(){

    let total = 0;

    document.querySelectorAll(".item-row").forEach(row => {

        let select = row.querySelector(".product-select");
        let qtyInput = row.querySelector(".quantity-input");

        if(select.value && qtyInput.value){

            let price = parseFloat(
                select.options[select.selectedIndex]
                .getAttribute("data-price")
            );

            let qty = parseInt(qtyInput.value);

            total += price * qty;
        }
    });

    document.getElementById("totalDisplay").innerText = total.toLocaleString();
}

/* ================= BLOQUER PRODUIT DOUBLE ================= */

function checkDuplicate(currentSelect){

    let selectedValue = currentSelect.value;

    if(!selectedValue) return;

    let duplicates = 0;

    document.querySelectorAll(".product-select").forEach(select => {
        if(select.value === selectedValue){
            duplicates++;
        }
    });

    if(duplicates > 1){
        alert("⚠ Ce produit est déjà sélectionné !");
        currentSelect.value = "";
    }
}

/* ================= VERIFICATION STOCK ================= */

function validateStock(input){

    const row = input.closest(".item-row");
    const select = row.querySelector(".product-select");

    if(!select.value) return;

    const stock = parseInt(
        select.options[select.selectedIndex]
        .getAttribute("data-stock")
    );

    const qty = parseInt(input.value);

    if(qty > stock){
        alert("⚠ Quantité supérieure au stock disponible !");
        input.value = stock;
    }
}

/* ================= ENVOI FORMULAIRE ================= */

document.getElementById("saleForm").addEventListener("submit", async function(e){

    e.preventDefault();

    let items = [];

    document.querySelectorAll(".item-row").forEach(row => {

        let product = row.querySelector(".product-select").value;
        let quantity = row.querySelector(".quantity-input").value;

        if(product && quantity){
            items.push({
                product_id: parseInt(product),
                quantity: parseInt(quantity)
            });
        }
    });

    if(items.length === 0){
        alert("Ajoutez au moins un produit !");
        return;
    }

    const response = await fetch("/sales/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items})
    });

    const data = await response.json();

    if(response.ok){
        alert("✅ Vente enregistrée !");
        window.location.href = "/sales";
    } else {
        alert("Erreur : " + data.detail);
    }

});

/* ================= AJOUT AUTOMATIQUE PREMIER CHAMP ================= */

window.onload = function(){
    addItem();
};

</script>

{% endblock %}
