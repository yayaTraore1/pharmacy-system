<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Pharmacie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pharmacy-teal: #2c7a7b;
            --pharmacy-dark: #1f5556;
            --pharmacy-light: #f4f7fa;
            --pharmacy-soft: #eef6f7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, rgba(44, 122, 123, 0.15), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(31, 85, 86, 0.18), transparent 30%),
                        var(--pharmacy-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            border: none;
            border-radius: 1.25rem;
            background: white;
            box-shadow: 0 24px 80px rgba(31, 85, 86, 0.08);
            overflow: hidden;
        }

        .login-card-header {
            background: linear-gradient(135deg, var(--pharmacy-dark), var(--pharmacy-teal));
            color: white;
            padding: 2rem 1.75rem 1.75rem;
            text-align: center;
        }

        .login-card-header .logo {
            width: 90px;
            margin-bottom: 1rem;
            filter: brightness(1.1);
        }

        .login-card-header h3 {
            margin-bottom: 0.5rem;
            font-size: 1.85rem;
            font-weight: 700;
        }

        .login-card-header p {
            color: rgba(255,255,255,0.82);
            margin-bottom: 0;
        }

        .login-body {
            padding: 2rem;
        }

        .form-control,
        .form-select {
            border-radius: 0.85rem;
            padding: 0.95rem 1rem;
            border: 1px solid #d9e3e4;
        }

        .form-control:focus {
            border-color: var(--pharmacy-teal);
            box-shadow: 0 0 0 0.2rem rgba(44, 122, 123, 0.18);
        }

        .btn-login {
            width: 100%;
            border-radius: 0.85rem;
            padding: 0.95rem 1rem;
            background: var(--pharmacy-teal);
            border-color: var(--pharmacy-teal);
            font-weight: 700;
        }

        .btn-login:hover {
            background: #215a5b;
            border-color: #215a5b;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.25rem;
        }

        .login-footer a {
            color: var(--pharmacy-dark);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: var(--pharmacy-teal);
            text-decoration: underline;
        }

        .alert-box {
            border-radius: 0.85rem;
            padding: 1rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
        }

        .alert-success {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: white;
        }

        .alert-error {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            color: white;
        }

        @media (max-width: 575.98px) {
            .login-card-header {
                padding: 1.75rem 1.25rem 1.5rem;
            }

            .login-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-card-header">
                <img src="/static/images/logo.png" alt="Logo Pharmacie" class="logo">
                <h3>Connexion Pharmacie</h3>
                <p>Connectez-vous pour accéder à votre espace de gestion</p>
            </div>
            <div class="login-body">
                {% if success %}
                <div class="alert-box alert-success">
                    <i class="bi bi-check-circle-fill"></i>
                    {{ success }}
                </div>
                {% endif %}
                {% if error %}
                <div class="alert-box alert-error">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/auth/login">
                    <div class="mb-3">
                        <label class="form-label">Nom d'utilisateur</label>
                        <input type="text" name="username" class="form-control" placeholder="Entrez votre nom d'utilisateur" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" required>
                    </div>
                    <button type="submit" class="btn btn-login">Se connecter</button>
                </form>

                <div class="login-footer">
                    <small>Mot de passe oublié ? <a href="/auth/forgot-password">Cliquez ici</a></small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
