<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer votre mot de passe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fa;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

.card-box{
max-width:420px;
width:100%;
padding:2.5rem;
border-radius:1rem;
background:white;
box-shadow:0 8px 24px rgba(0,0,0,0.1);
}

h3{
font-weight:700;
color:#2c7a7b;
}

.btn-main{
background:#2c7a7b;
border:none;
font-weight:600;
}

.btn-main:hover{
background:#285e61;
}

.form-control:focus{
border-color:#2c7a7b;
box-shadow:0 0 0 .2rem rgba(44,122,123,.25);
}

</style>

</head>

<body>

<div class="card-box">

<div class="text-center mb-4">
<h3>Créer votre mot de passe</h3>
<p class="text-muted small">Finalisez la création de votre compte</p>
</div>

{% if error %}
<div class="alert alert-danger">{{error}}</div>
{% endif %}

<form method="post">

<input type="hidden" name="token" value="{{token}}">

<div class="mb-3">
<label>Nouveau mot de passe</label>
<input type="password" name="password" class="form-control" required>
</div>

<div class="mb-3">
<label>Confirmer mot de passe</label>
<input type="password" name="confirm_password" class="form-control" required>
</div>

<button class="btn btn-main w-100">
Créer le mot de passe
</button>

</form>

</div>

</body>
</html>
